# Configuración para el acceso a la Base de Datos
spring.jpa.hibernate.ddl-auto=validate

# Puerto por donde escucha el servidor cuando se inicie
server.port=8080

# Path de la web API
spring.data.rest.base-path=/api

#Lengua local del proyecto
spring.web.locale=es_ES
spring.web.locale-resolver=fixed

#Versión de la API
spring.application.version=1.0.0

# Datos de conexión con la base de datos MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3307/gameroster
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=miguel
spring.datasource.password=1234

# Muestra las query SQL que ejecuta Hibernate
spring.jpa.show-sql=true

# Habilitar Flyway
spring.flyway.enabled=true
# Validar migraciones antes de aplicar
spring.flyway.validate-on-migrate=true
# Ubicación de los scripts de migración
spring.flyway.locations=classpath:db/migration
# JWT
jwt.secret=mi_clave_super_secreta_gameroster_2026
jwt.expiration=86400000